<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Ops Intelligence | Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #001a4d; color: #fdfdfd; font-family: 'Segoe UI', sans-serif; }
        .gold-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .bg-navy-light { background-color: rgba(255, 255, 255, 0.05); }
        .input-style { background-color: white; color: #1a1a1a; border-radius: 4px; padding: 8px; width: 100%; border: 1px solid #D4AF37; font-size: 0.9rem; }
        .btn-primary { background-color: #D4AF37; color: #001a4d; font-weight: bold; }
        .btn-primary:hover { background-color: #B8962E; transform: translateY(-1px); }
        .btn-outline { border: 1px solid #D4AF37; color: #D4AF37; font-weight: bold; }
        .chart-container { position: relative; height: 200px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto border-t-4 gold-border bg-navy-light p-6 rounded-b-lg shadow-2xl">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-light tracking-[0.2em] gold-text uppercase">Sovereign Ops Intelligence</h1>
            <p class="text-[10px] uppercase tracking-widest opacity-70 mt-1">Módulo Avanzado de Logística y Seguridad</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-4 bg-black/20 p-4 rounded border border-white/5">
                <h2 class="text-sm font-bold border-b gold-border pb-1 uppercase gold-text">Registro de Miembros</h2>
                <div>
                    <label class="block text-[10px] uppercase mb-1">Llegadas (M/F) & Villas:</label>
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="llegadaM" placeholder="M" class="input-style">
                        <input type="number" id="llegadaF" placeholder="F" class="input-style">
                    </div>
                    <input type="text" id="villasLlegada" placeholder="Villas destino" class="input-style">
                </div>
                <div>
                    <label class="block text-[10px] uppercase mb-1">Actividad OP Fuera (M/F) & Villas:</label>
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="opM" placeholder="M" class="input-style">
                        <input type="number" id="opF" placeholder="F" class="input-style">
                    </div>
                    <input type="text" id="villasOP" placeholder="Villas origen" class="input-style">
                </div>
                <div>
                    <label class="block text-[10px] uppercase mb-1">Retiros (M/F):</label>
                    <div class="flex gap-2">
                        <input type="number" id="salidaM" placeholder="M" class="input-style">
                        <input type="number" id="salidaF" placeholder="F" class="input-style">
                    </div>
                </div>
            </div>

            <div class="space-y-4 bg-black/20 p-4 rounded border border-white/5">
                <h2 class="text-sm font-bold border-b gold-border pb-1 uppercase gold-text">Control de Visitas</h2>
                <div>
                    <label class="block text-[10px] uppercase mb-1">Entrada de Visitas (M/F):</label>
                    <div class="flex gap-2">
                        <input type="number" id="visEntradaM" placeholder="Masc" class="input-style">
                        <input type="number" id="visEntradaF" placeholder="Fem" class="input-style">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] uppercase mb-1">Salida de Visitas (M/F):</label>
                    <div class="flex gap-2">
                        <input type="number" id="visSalidaM" placeholder="Masc" class="input-style">
                        <input type="number" id="visSalidaF" placeholder="Fem" class="input-style">
                    </div>
                </div>
                <div class="pt-4 space-y-2">
                    <button onclick="calcularReporte()" class="w-full btn-primary py-3 rounded uppercase text-xs tracking-widest shadow-lg">Actualizar Inteligencia</button>
                    <button onclick="exportarPDF()" class="w-full btn-outline py-2 rounded uppercase text-[10px] tracking-widest">Exportar PDF</button>
                    <button onclick="limpiarFormulario()" class="w-full text-red-400 text-[9px] uppercase mt-2 opacity-50 hover:opacity-100">Reiniciar Turno</button>
                </div>
            </div>

            <div class="bg-black/30 p-4 rounded border border-gold/20 flex flex-col justify-between">
                <h2 class="text-sm font-bold border-b gold-border pb-1 uppercase gold-text mb-4 text-center">Estado de Propiedad</h2>
                <div class="chart-container">
                    <canvas id="opsChart"></canvas>
                </div>
                <div id="resumenRapido" class="mt-4 text-center space-y-1">
                    <p id="totalGral" class="text-2xl font-bold">0</p>
                    <p class="text-[10px] uppercase opacity-60">Personas Totales en Perímetro</p>
                </div>
            </div>
        </div>

        <div id="resultados" class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-4 hidden border-t gold-border pt-6">
            <div class="p-3 bg-white/5 rounded">
                <p class="text-[10px] uppercase gold-text">Miembros Activos</p>
                <p id="resMiem" class="text-lg">0</p>
            </div>
            <div class="p-3 bg-white/5 rounded">
                <p class="text-[10px] uppercase gold-text">Visitas Activas</p>
                <p id="resVis" class="text-lg">0</p>
            </div>
            <div class="p-3 bg-white/5 rounded">
                <p class="text-[10px] uppercase gold-text">Total Masculinos</p>
                <p id="resM" class="text-lg">0</p>
            </div>
            <div class="p-3 bg-white/5 rounded">
                <p class="text-[10px] uppercase gold-text">Total Femeninos</p>
                <p id="resF" class="text-lg">0</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
