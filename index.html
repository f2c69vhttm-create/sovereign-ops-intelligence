<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div id="report-section" class="p-6 space-y-8 bg-[#000d26] text-white min-h-screen font-['Inter']">
    
    <div class="flex justify-between items-end border-b border-[#D4AF37]/30 pb-4">
        <div>
            <h2 class="text-[#D4AF37] font-bold tracking-[0.2em] uppercase text-sm">Executive Operations Report</h2>
            <p class="text-[10px] opacity-50 uppercase tracking-widest">Playa Grande Golf & Ocean Club | Live Data</p>
        </div>
        <button onclick="window.print()" class="text-[9px] border border-[#D4AF37] text-[#D4AF37] px-4 py-2 rounded hover:bg-[#D4AF37] hover:text-[#000d26] transition uppercase font-bold tracking-widest">
            Export to PDF
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white/5 border border-white/10 p-5 rounded-2xl">
            <p class="text-[9px] uppercase opacity-40 tracking-widest mb-1">Total Members Present</p>
            <h3 class="text-3xl font-bold text-[#D4AF37]">42</h3>
        </div>
        <div class="bg-white/5 border border-white/10 p-5 rounded-2xl">
            <p class="text-[9px] uppercase opacity-40 tracking-widest mb-1">Total Visitors (Today)</p>
            <h3 class="text-3xl font-bold text-white">156</h3>
        </div>
        <div class="bg-white/5 border border-white/10 p-5 rounded-2xl">
            <p class="text-[9px] uppercase opacity-40 tracking-widest mb-1">Peak Hour Traffic</p>
            <h3 class="text-3xl font-bold text-white">14:00 <span class="text-xs opacity-50">PM</span></h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
            <p class="text-[10px] uppercase tracking-widest text-[#D4AF37] mb-6">Hourly Traffic Flow</p>
            <canvas id="trafficChart"></canvas>
        </div>

        <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
            <p class="text-[10px] uppercase tracking-widest text-[#D4AF37] mb-6">Visitor Segmentation</p>
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
</div>

<script>
    // 1. Configuración Gráfica de Tráfico (Líneas)
    const ctxTraffic = document.getElementById('trafficChart').getContext('2d');
    new Chart(ctxTraffic, {
        type: 'line',
        data: {
            labels: ['8am', '10am', '12pm', '2pm', '4pm', '6pm'],
            datasets: [{
                label: 'Visits',
                data: [12, 45, 87, 120, 65, 30],
                borderColor: '#D4AF37',
                backgroundColor: 'rgba(212, 175, 55, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
            }
        }
    });

    // 2. Configuración Gráfica de Segmentación (Barras)
    const ctxCategory = document.getElementById('categoryChart').getContext('2d');
    new Chart(ctxCategory, {
        type: 'bar',
        data: {
            labels: ['Members', 'Guests', 'Staff', 'Deliveries'],
            datasets: [{
                data: [42, 85, 30, 15],
                backgroundColor: ['#D4AF37', '#ffffff', '#4a5568', '#2d3748']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { grid: { display: false } }
            }
        }
    });
</script>
