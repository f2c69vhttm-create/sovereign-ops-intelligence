<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Intel - Registro de Miembros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #002366; color: #fdfdfd; }
        .gold-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .btn-gold { background-color: #D4AF37; color: #002366; }
        .btn-gold:hover { background-color: #B8962E; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto border-2 gold-border p-6 rounded-lg bg-opacity-10 bg-black">
        <h1 class="text-3xl font-bold mb-6 text-center gold-text uppercase tracking-widest">Control Operativo de Propiedad</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h2 class="text-xl font-semibold border-b gold-border pb-2">Registros de Miembros</h2>
                <div>
                    <label class="block text-sm">Llegadas (Villas destino):</label>
                    <input type="text" id="villasLlegada" placeholder="Ej: 10, 15, 22" class="w-full p-2 rounded text-black">
                    <div class="flex gap-2 mt-2">
                        <input type="number" id="llegadaM" placeholder="Masc" class="w-1/2 p-2 rounded text-black">
                        <input type="number" id="llegadaF" placeholder="Fem" class="w-1/2 p-2 rounded text-black">
                    </div>
                </div>

                <div>
                    <label class="block text-sm">Salidas/Retiros (Villas origen):</label>
                    <input type="text" id="villasSalida" placeholder="Ej: 5, 12" class="w-full p-2 rounded text-black">
                    <div class="flex gap-2 mt-2">
                        <input type="number" id="salidaM" placeholder="Masc" class="w-1/2 p-2 rounded text-black">
                        <input type="number" id="salidaF" placeholder="Fem" class="w-1/2 p-2 rounded text-black">
                    </div>
                </div>

                <div>
                    <label class="block text-sm">Actividades OP Fuera (Villas):</label>
                    <input type="text" id="villasOP" placeholder="Ej: 8, 21" class="w-full p-2 rounded text-black">
                    <div class="flex gap-2 mt-2">
                        <input type="number" id="opM" placeholder="Masc" class="w-1/2 p-2 rounded text-black">
                        <input type="number" id="opF" placeholder="Fem" class="w-1/2 p-2 rounded text-black">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xl font-semibold border-b gold-border pb-2">Control de Visitas</h2>
                <div>
                    <label class="block text-sm">Entrada de Visitas:</label>
                    <input type="number" id="visitaEntrada" class="w-full p-2 rounded text-black">
                </div>
                <div>
                    <label class="block text-sm">Salida de Visitas:</label>
                    <input type="number" id="visitaSalida" class="w-full p-2 rounded text-black">
                </div>
                
                <button onclick="calcularReporte()" class="w-full btn-gold font-bold py-4 rounded transition mt-4 uppercase">Generar Reporte de Operaciones</button>
            </div>
        </div>

        <div id="resultados" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
            <div class="p-4 border gold-border rounded bg-white bg-opacity-5">
                <h3 class="gold-text font-bold">Estado Miembros</h3>
                <p id="resMiembrosPropiedad">En Propiedad: 0</p>
                <p id="resMiembrosFuera">En OP Fuera: 0</p>
                <p id="resRetirados">Total Retirados: 0</p>
            </div>
            <div class="p-4 border gold-border rounded bg-white bg-opacity-5">
                <h3 class="gold-text font-bold">Desglose Género</h3>
                <p id="resGeneroM">Masculinos: 0</p>
                <p id="resGeneroF">Femeninos: 0</p>
            </div>
            <div class="p-4 border gold-border rounded bg-white bg-opacity-5">
                <h3 class="gold-text font-bold">Control Visitas</h3>
                <p id="resVisitasDentro">Visitas en Propiedad: 0</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
