<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Ops | Intelligence Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #001a4d; color: #fdfdfd; font-family: 'Segoe UI', sans-serif; }
        .gold-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .input-style { background-color: white; color: #1a1a1a; border-radius: 4px; padding: 5px; width: 100%; border: 1px solid #D4AF37; font-size: 0.8rem; }
        .btn-primary { background-color: #D4AF37; color: #001a4d; font-weight: bold; }
        .section-label { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-7xl mx-auto border-t-4 gold-border bg-white/5 p-4 rounded-b-lg shadow-2xl">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-light tracking-[0.2em] gold-text uppercase">Sovereign Ops Intelligence</h1>
            <p class="text-[9px] uppercase tracking-widest opacity-70">Control de Miembros, Visitas y Logística Externa</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-1 space-y-3 bg-black/20 p-4 rounded border border-white/10">
                <div>
                    <label class="section-label gold-text">ID de Villa:</label>
                    <input type="text" id="idVilla" placeholder="Ej: Villa 05" class="input-style font-bold border-2">
                </div>

                <div class="p-2 border border-green-500/20 rounded bg-green-500/5">
                    <label class="section-label text-green-400">1. Miembros en Villa (M/F)</label>
                    <div class="flex gap-2">
                        <input type="number" id="miemM" placeholder="M" class="input-style">
                        <input type="number" id="miemF" placeholder="F" class="input-style">
                    </div>
                </div>

                <div class="p-2 border border-white/20 rounded bg-white/5">
                    <label class="section-label gold-text">2. Visitas en Villa (M/F)</label>
                    <div class="flex gap-2">
                        <input type="number" id="visM" placeholder="M" class="input-style">
                        <input type="number" id="visF" placeholder="F" class="input-style">
                    </div>
                </div>

                <div class="p-2 border border-blue-500/20 rounded bg-blue-500/5">
                    <label class="section-label text-blue-400">3. Actividad OP / Fuera (M/F)</label>
                    <div class="flex gap-2">
                        <input type="number" id="opM" placeholder="M" class="input-style">
                        <input type="number" id="opF" placeholder="F" class="input-style">
                    </div>
                </div>

                <div class="p-2 border border-red-500/20 rounded bg-red-500/5">
                    <label class="section-label text-red-400">4. Retiros / Salidas (M/F)</label>
                    <div class="flex gap-2">
                        <input type="number" id="outM" placeholder="M" class="input-style">
                        <input type="number" id="outF" placeholder="F" class="input-style">
                    </div>
                </div>

                <button onclick="registrarVilla()" class="w-full btn-primary py-3 rounded uppercase text-[10px] tracking-widest shadow-lg mt-2">Actualizar Villa</button>
                <button onclick="exportarPDF()" class="w-full border border-white/20 py-2 rounded uppercase text-[9px] opacity-70">Reporte PDF</button>
            </div>

            <div class="lg:col-span-1 bg-black/40 p-4 rounded border border-gold/20 flex flex-col justify-between">
                <h2 class="text-xs font-bold gold-text uppercase mb-4 text-center">Estado General</h2>
                <div style="height: 200px;"><canvas id="opsChart"></canvas></div>
                <div class="mt-4 grid grid-cols-2 gap-2 text-center border-t border-white/10 pt-4">
                    <div>
                        <p id="tMiem" class="text-xl font-bold">0</p>
                        <p class="text-[8px] uppercase opacity-60">Miembros</p>
                    </div>
                    <div>
                        <p id="tVis" class="text-xl font-bold text-white">0</p>
                        <p class="text-[8px] uppercase opacity-60">Visitas</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xs font-bold gold-text uppercase mb-2 border-b border-gold/30 pb-1">Inventario por Villa</h2>
                <div id="contenedorVillas" class="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-[600px] overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
