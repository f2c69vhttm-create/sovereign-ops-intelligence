<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Ops | Control Logístico Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #001a4d; color: #fdfdfd; font-family: 'Segoe UI', sans-serif; }
        .gold-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .input-style { background-color: white; color: #1a1a1a; border-radius: 4px; padding: 6px; width: 100%; border: 1px solid #D4AF37; font-size: 0.85rem; }
        .btn-primary { background-color: #D4AF37; color: #001a4d; font-weight: bold; }
        .section-label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .card-villa { background: rgba(255,255,255,0.05); border-left: 4px solid #D4AF37; transition: 0.3s; }
    </style>
</head>
<body class="p-2 md:p-6">
    <div class="max-w-7xl mx-auto border-t-4 gold-border bg-white/5 p-4 rounded-b-lg shadow-2xl">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-light tracking-[0.2em] gold-text uppercase">Sovereign Ops Intelligence</h1>
            <p class="text-[9px] uppercase tracking-widest opacity-70">Registro de Propiedad, Actividades OP y Retiros</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4 bg-black/20 p-4 rounded border border-white/10">
                <h2 class="text-xs font-bold border-b gold-border pb-1 uppercase gold-text mb-4 text-center">Formulario de Control</h2>
                
                <div>
                    <label class="section-label gold-text">ID de Villa:</label>
                    <input type="text" id="idVilla" placeholder="Ej: Villa 05" class="input-style font-bold border-2">
                </div>

                <div class="p-2 border border-green-500/30 rounded bg-green-500/5">
                    <label class="section-label text-green-400">1. En Propiedad (Dentro)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="inM" placeholder="Masc" class="input-style">
                        <input type="number" id="inF" placeholder="Fem" class="input-style">
                    </div>
                </div>

                <div class="p-2 border border-blue-500/30 rounded bg-blue-500/5">
                    <label class="section-label text-blue-400">2. Actividad OP (Fuera)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="opM" placeholder="Masc" class="input-style">
                        <input type="number" id="opF" placeholder="Fem" class="input-style">
                    </div>
                </div>

                <div class="p-2 border border-red-500/30 rounded bg-red-500/5">
                    <label class="section-label text-red-400">3. Retiros / Salidas</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="outM" placeholder="Masc" class="input-style">
                        <input type="number" id="outF" placeholder="Fem" class="input-style">
                    </div>
                </div>

                <div class="pt-2 space-y-2">
                    <button onclick="registrarVilla()" class="w-full btn-primary py-3 rounded uppercase text-[10px] tracking-widest shadow-lg">Actualizar Datos</button>
                    <button onclick="exportarPDF()" class="w-full border border-white/20 py-2 rounded uppercase text-[9px] opacity-70">Exportar PDF</button>
                    <button onclick="location.reload()" class="w-full text-red-400 text-[8px] uppercase mt-2 opacity-50">Limpiar Todo</button>
                </div>
            </div>

            <div class="lg:col-span-1 bg-black/40 p-4 rounded border border-gold/20 flex flex-col justify-between">
                <h2 class="text-xs font-bold gold-text uppercase mb-4 text-center">Estado de Ocupación</h2>
                <div style="height: 220px;"><canvas id="opsChart"></canvas></div>
                <div class="mt-4 grid grid-cols-2 gap-2 text-center border-t border-white/10 pt-4">
                    <div>
                        <p id="tProp" class="text-2xl font-bold">0</p>
                        <p class="text-[8px] uppercase opacity-60">En Propiedad</p>
                    </div>
                    <div>
                        <p id="tFuera" class="text-2xl font-bold text-blue-400">0</p>
                        <p class="text-[8px] uppercase opacity-60">Fuera (OP)</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xs font-bold gold-text uppercase mb-2 px-2 border-b border-gold/30">Detalle por Villa</h2>
                <div id="contenedorVillas" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[600px] overflow-y-auto p-1">
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
